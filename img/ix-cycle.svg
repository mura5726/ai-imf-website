<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="IX Analyzer データ分析サイクル">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E4FA3"/>
      <stop offset="100%" stop-color="#0F2D6B"/>
    </linearGradient>
    <radialGradient id="centerGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1E4FA3"/>
      <stop offset="100%" stop-color="#0A1F44"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#C9A961"/>
    </marker>
  </defs>

  <rect width="600" height="600" fill="#F7FAFE"/>
  <circle cx="300" cy="300" r="248" fill="none" stroke="#E8F1FC" stroke-width="1"/>

  <g fill="none" stroke="#C9A961" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
    <path d="M 380,100 A 230 230 0 0 1 478,150" marker-end="url(#arrowGold)"/>
    <path d="M 506,222 A 230 230 0 0 1 506,378" marker-end="url(#arrowGold)"/>
    <path d="M 478,450 A 230 230 0 0 1 380,500" marker-end="url(#arrowGold)"/>
    <path d="M 220,500 A 230 230 0 0 1 122,450" marker-end="url(#arrowGold)"/>
    <path d="M 94,378 A 230 230 0 0 1 94,222" marker-end="url(#arrowGold)"/>
    <path d="M 122,150 A 230 230 0 0 1 220,100" marker-end="url(#arrowGold)"/>
  </g>

  <g font-family="Yu Gothic, Meiryo, sans-serif">
    <g transform="translate(300,80)">
      <rect x="-78" y="-32" width="156" height="64" rx="32" ry="32" fill="url(#ringGrad)" filter="url(#softShadow)"/>
      <text text-anchor="middle" y="-6" font-size="13" fill="#E1C988" font-style="italic" font-family="Palatino Linotype, serif">01</text>
      <text text-anchor="middle" y="16" font-size="18" font-weight="700" fill="#FFFFFF">顧客理解</text>
    </g>
    <g transform="translate(490,180)">
      <rect x="-78" y="-32" width="156" height="64" rx="32" ry="32" fill="url(#ringGrad)" filter="url(#softShadow)"/>
      <text text-anchor="middle" y="-6" font-size="13" fill="#E1C988" font-style="italic" font-family="Palatino Linotype, serif">02</text>
      <text text-anchor="middle" y="16" font-size="18" font-weight="700" fill="#FFFFFF">目標設定</text>
    </g>
    <g transform="translate(490,420)">
      <rect x="-90" y="-32" width="180" height="64" rx="32" ry="32" fill="url(#ringGrad)" filter="url(#softShadow)"/>
      <text text-anchor="middle" y="-6" font-size="13" fill="#E1C988" font-style="italic" font-family="Palatino Linotype, serif">03</text>
      <text text-anchor="middle" y="16" font-size="15" font-weight="700" fill="#FFFFFF">企画／仮説立案</text>
    </g>
    <g transform="translate(300,520)">
      <rect x="-78" y="-32" width="156" height="64" rx="32" ry="32" fill="url(#ringGrad)" filter="url(#softShadow)"/>
      <text text-anchor="middle" y="-6" font-size="13" fill="#E1C988" font-style="italic" font-family="Palatino Linotype, serif">04</text>
      <text text-anchor="middle" y="16" font-size="18" font-weight="700" fill="#FFFFFF">仮説検証</text>
    </g>
    <g transform="translate(110,420)">
      <rect x="-78" y="-32" width="156" height="64" rx="32" ry="32" fill="url(#ringGrad)" filter="url(#softShadow)"/>
      <text text-anchor="middle" y="-6" font-size="13" fill="#E1C988" font-style="italic" font-family="Palatino Linotype, serif">05</text>
      <text text-anchor="middle" y="16" font-size="18" font-weight="700" fill="#FFFFFF">施策実行</text>
    </g>
    <g transform="translate(110,180)">
      <rect x="-78" y="-32" width="156" height="64" rx="32" ry="32" fill="url(#ringGrad)" filter="url(#softShadow)"/>
      <text text-anchor="middle" y="-6" font-size="13" fill="#E1C988" font-style="italic" font-family="Palatino Linotype, serif">06</text>
      <text text-anchor="middle" y="16" font-size="18" font-weight="700" fill="#FFFFFF">効果検証</text>
    </g>
  </g>

  <g>
    <circle cx="300" cy="300" r="110" fill="url(#centerGrad)" stroke="#C9A961" stroke-width="2" filter="url(#softShadow)"/>
    <text x="300" y="282" text-anchor="middle" font-family="Palatino Linotype, serif" font-style="italic" font-size="14" fill="#E1C988">Data Foundation</text>
    <line x1="245" y1="294" x2="355" y2="294" stroke="#C9A961" stroke-width="0.6"/>
    <text x="300" y="320" text-anchor="middle" font-family="Yu Gothic, Meiryo, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">データ</text>
    <text x="300" y="348" text-anchor="middle" font-family="Yu Gothic, Meiryo, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">分析基盤</text>
  </g>
</svg>
