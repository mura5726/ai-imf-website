<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" role="img" aria-label="DX Analyzer ダッシュボード">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F2D6B"/>
      <stop offset="100%" stop-color="#0A1F44"/>
    </linearGradient>
    <linearGradient id="barGold" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#9B8849"/>
      <stop offset="100%" stop-color="#E1C988"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1E4FA3"/>
      <stop offset="100%" stop-color="#7BB5F0"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="700" height="480" fill="#F7FAFE"/>

  <!-- Main dashboard card -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="30" width="640" height="420" rx="14" fill="url(#cardBg)"/>
  </g>

  <!-- Top bar -->
  <g font-family="Yu Gothic, Meiryo, sans-serif">
    <rect x="30" y="30" width="640" height="56" rx="14" fill="#0A1F44"/>
    <rect x="30" y="78" width="640" height="2" fill="#C9A961" opacity="0.55"/>
    <circle cx="56" cy="58" r="5" fill="#C9A961"/>
    <text x="74" y="62" font-size="14" font-weight="700" fill="#FFFFFF">DX Analyzer</text>
    <text x="74" y="62" font-size="14" fill="#FFFFFF" dx="98" font-family="Palatino Linotype, serif" font-style="italic" opacity="0.7">/ Executive View</text>
    <!-- Right side mini nav -->
    <g font-size="11" fill="#7BB5F0">
      <text x="500" y="62">概要</text>
      <text x="540" y="62">予測</text>
      <text x="580" y="62">部門</text>
      <text x="620" y="62" fill="#E1C988">設定</text>
    </g>
  </g>

  <!-- KPI cards row -->
  <g font-family="Yu Gothic, Meiryo, sans-serif">
    <!-- KPI 1 -->
    <g transform="translate(50,108)">
      <rect width="190" height="84" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(201,169,97,0.25)"/>
      <text x="14" y="22" font-size="10" fill="#E1C988" font-family="Palatino Linotype, serif" font-style="italic" letter-spacing="1">Revenue MTD</text>
      <text x="14" y="56" font-size="28" font-weight="700" fill="#FFFFFF">¥ 18.4M</text>
      <text x="14" y="74" font-size="11" fill="#7BB5F0">▲ 12.3% vs 前月</text>
    </g>
    <!-- KPI 2 -->
    <g transform="translate(255,108)">
      <rect width="190" height="84" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(201,169,97,0.25)"/>
      <text x="14" y="22" font-size="10" fill="#E1C988" font-family="Palatino Linotype, serif" font-style="italic" letter-spacing="1">Active Users</text>
      <text x="14" y="56" font-size="28" font-weight="700" fill="#FFFFFF">8,247</text>
      <text x="14" y="74" font-size="11" fill="#7BB5F0">▲ 4.1% vs 前月</text>
    </g>
    <!-- KPI 3 -->
    <g transform="translate(460,108)">
      <rect width="190" height="84" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(201,169,97,0.25)"/>
      <text x="14" y="22" font-size="10" fill="#E1C988" font-family="Palatino Linotype, serif" font-style="italic" letter-spacing="1">Conversion</text>
      <text x="14" y="56" font-size="28" font-weight="700" fill="#FFFFFF">3.86%</text>
      <text x="14" y="74" font-size="11" fill="#FF7B7B">▼ 0.4pt vs 前月</text>
    </g>
  </g>

  <!-- Bar chart (left) -->
  <g transform="translate(50,210)">
    <rect width="370" height="220" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(201,169,97,0.2)"/>
    <text x="18" y="28" font-size="12" fill="#E1C988" font-family="Palatino Linotype, serif" font-style="italic">部門別 売上推移</text>
    <!-- y axis lines -->
    <g stroke="rgba(255,255,255,0.08)" stroke-dasharray="2,3">
      <line x1="18" y1="60" x2="352" y2="60"/>
      <line x1="18" y1="100" x2="352" y2="100"/>
      <line x1="18" y1="140" x2="352" y2="140"/>
      <line x1="18" y1="180" x2="352" y2="180"/>
    </g>
    <!-- bars: alternating gold and blue, 7 months -->
    <g>
      <!-- 7 month bars; each pair (gold + blue) -->
      <rect x="34" y="120" width="14" height="60" fill="url(#barBlue)"/>
      <rect x="50" y="100" width="14" height="80" fill="url(#barGold)"/>

      <rect x="80" y="110" width="14" height="70" fill="url(#barBlue)"/>
      <rect x="96" y="85" width="14" height="95" fill="url(#barGold)"/>

      <rect x="126" y="95" width="14" height="85" fill="url(#barBlue)"/>
      <rect x="142" y="70" width="14" height="110" fill="url(#barGold)"/>

      <rect x="172" y="90" width="14" height="90" fill="url(#barBlue)"/>
      <rect x="188" y="60" width="14" height="120" fill="url(#barGold)"/>

      <rect x="218" y="75" width="14" height="105" fill="url(#barBlue)"/>
      <rect x="234" y="50" width="14" height="130" fill="url(#barGold)"/>

      <rect x="264" y="70" width="14" height="110" fill="url(#barBlue)"/>
      <rect x="280" y="45" width="14" height="135" fill="url(#barGold)"/>

      <rect x="310" y="60" width="14" height="120" fill="url(#barBlue)"/>
      <rect x="326" y="40" width="14" height="140" fill="url(#barGold)"/>
    </g>
    <!-- legend -->
    <g font-size="9" fill="rgba(255,255,255,0.7)">
      <rect x="220" y="200" width="9" height="9" fill="#7BB5F0"/>
      <text x="233" y="208">既存事業</text>
      <rect x="285" y="200" width="9" height="9" fill="#E1C988"/>
      <text x="298" y="208">新規事業</text>
    </g>
  </g>

  <!-- Line / donut (right) -->
  <g transform="translate(440,210)">
    <rect width="210" height="220" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(201,169,97,0.2)"/>
    <text x="16" y="28" font-size="12" fill="#E1C988" font-family="Palatino Linotype, serif" font-style="italic">顧客セグメント</text>

    <!-- Donut chart -->
    <g transform="translate(105,118)">
      <circle r="58" fill="none" stroke="#1E4FA3" stroke-width="22"/>
      <!-- Gold segment ~40% -->
      <circle r="58" fill="none" stroke="#E1C988" stroke-width="22"
        stroke-dasharray="146 365" stroke-dashoffset="0" transform="rotate(-90)"/>
      <!-- Sky blue segment ~25% -->
      <circle r="58" fill="none" stroke="#7BB5F0" stroke-width="22"
        stroke-dasharray="91 365" stroke-dashoffset="-146" transform="rotate(-90)"/>
      <!-- Center text -->
      <text text-anchor="middle" y="-2" font-size="11" fill="#E1C988" font-family="Palatino Linotype, serif" font-style="italic">Total</text>
      <text text-anchor="middle" y="18" font-size="20" font-weight="700" fill="#FFFFFF">8,247</text>
    </g>

    <!-- Legend list -->
    <g font-size="10" fill="rgba(255,255,255,0.8)" font-family="Yu Gothic, Meiryo, sans-serif">
      <g transform="translate(16,196)">
        <rect width="8" height="8" fill="#E1C988"/>
        <text x="14" y="8">エンプラ 40%</text>
      </g>
      <g transform="translate(95,196)">
        <rect width="8" height="8" fill="#7BB5F0"/>
        <text x="14" y="8">中堅 25%</text>
      </g>
      <g transform="translate(160,196)">
        <rect width="8" height="8" fill="#1E4FA3"/>
        <text x="14" y="8">SMB</text>
      </g>
    </g>
  </g>
</svg>
